[phases.setup]
nixPkgs = ["php83", "php83Extensions.curl", "php83Extensions.dom", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.zip", "php83Extensions.pdo_mysql", "php83Extensions.gd", "php83Extensions.bcmath"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan key:generate --force", "mkdir -p storage/app/public/lessons storage/app/public/assignments storage/app/public/submissions", "php artisan migrate --force", "php artisan db:seed --force", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache", "php artisan storage:link --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
